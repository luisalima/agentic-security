site_name: Agentic Security Guide
site_url: https://luisalima.github.io/agentic-security/
site_description: A step-by-step guide to securing AI agents against prompt injection.
site_author: Luisa Lima
repo_url: https://github.com/luisalima/agentic-security
repo_name: luisalima/agentic-security
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    logo: material/shield-lock
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  favicon: assets/favicon.svg
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.top
    - navigation.tracking
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.indexes
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.code.select
    - content.tabs.link
    - content.action.edit
    - content.action.view
    - content.tooltips

extra:
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/luisalima/agentic-security
      name: Source on GitHub

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  # Python Markdown
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      permalink_title: Anchor link to this section

  # PyMdown Extensions
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.details
  - pymdownx.keys
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.critic
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search:
      separator: '[\s\u200b\-_,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  # Uncomment once `mkdocs-material[imaging]` and system libs (cairo, pango) are
  # installed — enables auto-generated Open Graph / Twitter social cards.
  # - social

nav:
  - Home: index.md
  - Principles: principles.md
  - Guide:
      - Vulnerabilities: guide/0_vulnerabilities.md
      - Detection: guide/1_detection.md
      - Observability & Audit Trails: guide/1b_observability.md
      - Prompt Engineering: guide/2_prompt_engineering.md
      - Isolation (Infra): guide/3_isolation.md
      - Secure Architecture (Software): guide/4_secure_architecture.md
      - Defense in Depth: guide/5_defense_in_depth.md
      - Framework Integration: guide/6_integration.md
      - Securing Pre-Packaged Agents: guide/7_securing_prepackaged_agents.md
      - Enterprise Zero Trust: guide/8_enterprise_zero_trust.md
      - MCP Security: guide/9_mcp_security.md
      - Memory & Context Security: guide/10_memory_security.md
  - Reference:
      - Tools Landscape: reference/tools.md
      - Attack Taxonomy: reference/attack_taxonomy.md
      - Threat Model: reference/threat_model.md
      - Cheatsheet: reference/cheatsheet.md
      - Architecture: reference/architecture.md
      - Tradeoffs: reference/tradeoffs.md
      - References: reference/references.md
